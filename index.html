<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insight by Prem — Watch Now</title>

  <meta property="og:type" content="video.other" />
  <meta property="og:site_name" content="Insight by Prem" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2a;
      --red: #ff2d55;
      --red-glow: rgba(255, 45, 85, 0.35);
      --white: #f5f5f7;
      --gray: #8e8e93;
      --green: #34c759;
      --font: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--white);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--red-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 4s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.4; transform: translateX(-50%) scale(1); }
      to { opacity: 0.7; transform: translateX(-50%) scale(1.15); }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      animation: fadeUp 0.6s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #ff6b8a);
      padding: 3px;
      margin: 0 auto 1.25rem;
      animation: fadeUp 0.6s ease-out 0.1s both;
    }

    .avatar-ring .inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--red);
      letter-spacing: -1px;
    }

    .channel-name {
      font-size: 0.8rem;
      font-family: var(--mono);
      color: var(--gray);
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.6s ease-out 0.15s both;
    }

    .title {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.4rem;
      padding: 0 0.5rem;
    }

    .video-id-display {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--gray);
      margin-bottom: 1.75rem;
      opacity: 0.6;
    }

    /* Shared button styles */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--red);
      color: #fff;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 32px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px var(--red-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px var(--red-glow);
    }

    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary svg { width: 22px; height: 22px; fill: currentColor; }

    .fallback {
      display: block;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }

    .fallback:hover { color: var(--white); }

    .status {
      margin-top: 2rem;
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .status .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ========== GENERATOR STYLES ========== */
    .subtitle {
      color: var(--gray);
      font-size: 0.85rem;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 1rem;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--gray);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input::placeholder { color: #444; }
    .input-group input:focus { border-color: var(--red); }

    .btn-generate {
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: #fff;
      font-family: var(--font);
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 24px var(--red-glow);
      margin-top: 0.5rem;
    }

    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--red-glow); }
    .btn-generate:active { transform: scale(0.97); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .result-area {
      display: none;
      margin-top: 1.5rem;
      animation: fadeUp 0.4s ease-out both;
    }

    .result-label {
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      text-align: left;
    }

    .result-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-box .link-text {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--white);
      word-break: break-all;
      text-align: left;
      line-height: 1.4;
      user-select: all;
    }

    .btn-copy {
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--border);
      border: none;
      border-radius: 8px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.72rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-copy:hover { background: #2a2a3a; }
    .btn-copy.copied { background: var(--green); color: #000; }

    .btn-test {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--red);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn-test:hover { opacity: 0.8; }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 1.5rem auto;
    }

    .channel-link {
      font-size: 0.78rem;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }

    .channel-link:hover { color: var(--white); }

    /* Hide both views initially */
    .player, .generator { display: none; }
  </style>
</head>
<body>

  <!-- ===== PLAYER VIEW (when ?v= is present) ===== -->
  <div class="container player" id="playerView">
    <div class="avatar-ring"><div class="inner">P</div></div>
    <div class="channel-name">@insightbyprem</div>
    <h1 class="title" id="videoTitle">Opening video…</h1>
    <div class="video-id-display" id="videoIdDisplay"></div>

    <a class="btn-primary" id="openBtn" href="#">
      <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.546 12 3.546 12 3.546s-7.505 0-9.377.504A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.504 9.376.504 9.376.504s7.505 0 9.377-.504a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><path fill="#0a0a0f" d="M9.545 15.568V8.432L15.818 12z"/></svg>
      Open in YouTube
    </a>

    <a class="fallback" id="fallbackLink" href="#">or open in browser →</a>

    <div class="status">
      <span class="dot"></span>
      <span id="platformInfo">detecting…</span>
    </div>
  </div>

  <!-- ===== GENERATOR VIEW (no ?v= → link builder) ===== -->
  <div class="container generator" id="generatorView">
    <div class="avatar-ring"><div class="inner">P</div></div>
    <div class="channel-name">@insightbyprem</div>
    <h1 class="title" style="margin-bottom: 0.6rem;">Link Generator</h1>
    <p class="subtitle">Paste a YouTube link or video ID to create a shareable "Open in App" link.</p>

    <div class="input-group">
      <label>YouTube URL or Video ID</label>
      <input type="text" id="videoInput" placeholder="e.g. dQw4w9WgXcQ or full URL" autocomplete="off" />
    </div>

    <div class="input-group">
      <label>Custom Title (optional)</label>
      <input type="text" id="titleInput" placeholder="e.g. My Latest Video" autocomplete="off" />
    </div>

    <button class="btn-generate" id="generateBtn" disabled>Generate Link</button>

    <div class="result-area" id="resultArea">
      <div class="result-label">Your shareable link</div>
      <div class="result-box">
        <span class="link-text" id="generatedLink"></span>
        <button class="btn-copy" id="copyBtn">Copy</button>
      </div>
      <a class="btn-test" id="testLink" href="#" target="_blank">Test this link →</a>
    </div>

    <div class="divider"></div>
    <a class="channel-link" href="https://youtube.com/@insightbyprem" target="_blank">Visit @insightbyprem on YouTube →</a>
  </div>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v') || params.get('id') || '';
      const customTitle = params.get('title') || '';

      if (videoId) {
        initPlayer(videoId, customTitle);
      } else {
        initGenerator();
      }

      // ===== PLAYER =====
      function initPlayer(vid, title) {
        document.getElementById('playerView').style.display = 'block';
        document.getElementById('videoTitle').textContent = title || 'Watch this video';
        document.getElementById('videoIdDisplay').textContent = vid;

        const youtubeUrl = `https://www.youtube.com/watch?v=${vid}`;
        document.getElementById('fallbackLink').href = youtubeUrl;

        const ua = navigator.userAgent || '';
        const isAndroid = /android/i.test(ua);
        const isIOS = /iphone|ipad|ipod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isMobile = isAndroid || isIOS;

        const pi = document.getElementById('platformInfo');
        if (isAndroid) pi.textContent = 'Android detected';
        else if (isIOS) pi.textContent = 'iOS detected';
        else pi.textContent = 'Desktop detected';

        let deepLink = youtubeUrl;
        if (isAndroid) {
          deepLink = `intent://www.youtube.com/watch?v=${vid}#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url=${encodeURIComponent(youtubeUrl)};end`;
        } else if (isIOS) {
          deepLink = `youtube://www.youtube.com/watch?v=${vid}`;
        }

        const openBtn = document.getElementById('openBtn');
        openBtn.href = deepLink;

        if (isIOS) {
          openBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = deepLink;
            setTimeout(() => { window.location.href = youtubeUrl; }, 1500);
          });
        }

        if (isMobile) {
          setTimeout(() => { window.location.href = deepLink; }, 800);
        }
      }

      // ===== GENERATOR =====
      function initGenerator() {
        document.getElementById('generatorView').style.display = 'block';

        const videoInput = document.getElementById('videoInput');
        const titleInput = document.getElementById('titleInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultArea = document.getElementById('resultArea');
        const generatedLink = document.getElementById('generatedLink');
        const copyBtn = document.getElementById('copyBtn');
        const testLink = document.getElementById('testLink');

        function extractVideoId(input) {
          input = input.trim();
          if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
          try {
            const url = new URL(input);
            if (url.searchParams.get('v')) return url.searchParams.get('v');
            if (url.hostname === 'youtu.be') return url.pathname.slice(1).split('/')[0];
            const m = url.pathname.match(/\/(shorts|embed|v|live)\/([A-Za-z0-9_-]{11})/);
            if (m) return m[2];
          } catch {}
          return null;
        }

        function getBaseUrl() {
          return window.location.origin + window.location.pathname;
        }

        videoInput.addEventListener('input', () => {
          generateBtn.disabled = !videoInput.value.trim();
          resultArea.style.display = 'none';
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        });

        generateBtn.addEventListener('click', () => {
          const vid = extractVideoId(videoInput.value);
          if (!vid) {
            videoInput.style.borderColor = '#ff3b30';
            setTimeout(() => { videoInput.style.borderColor = ''; }, 1500);
            return;
          }

          const title = titleInput.value.trim();
          let link = `${getBaseUrl()}?v=${vid}`;
          if (title) link += `&title=${encodeURIComponent(title)}`;

          generatedLink.textContent = link;
          testLink.href = link;
          resultArea.style.display = 'block';
          resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        copyBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(generatedLink.textContent).then(() => {
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => {
              copyBtn.textContent = 'Copy';
              copyBtn.classList.remove('copied');
            }, 2000);
          });
        });

        videoInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !generateBtn.disabled) generateBtn.click();
        });
      }
    })();
  </script>
</body>
</html>
