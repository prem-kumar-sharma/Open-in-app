<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Open in App</title>
  <meta property="og:type" content="video.other" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* =====================================================
       CONFIG — Change these variables to customise branding
       ===================================================== */
    :root {
      /* Brand colors */
      --accent: #FF2D55;
      --accent-rgb: 255, 45, 85;
      --accent-dark: #cc1a40;
      --accent-secondary: #6432ff;
      --accent-tertiary: #ff7832;

      /* Surfaces */
      --bg: #050508;
      --surface: rgba(255,255,255,0.04);
      --surface-solid: #0d0d12;
      --border: rgba(255,255,255,0.08);
      --white: #EEEEF0;
      --dim: #6B6B78;
      --green: #00E676;
      --green-soft: rgba(0,230,118,0.12);

      /* Typography */
      --display: 'Syne', sans-serif;
      --body: 'DM Sans', sans-serif;
      --mono: 'IBM Plex Mono', monospace;

      /* Spacing */
      --radius: 16px;
      --card-max-w: 420px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--white);
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* ============ ATMOSPHERIC BACKGROUND ============ */
    .atmosphere {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }

    .atmo-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      animation: orbFloat 14s ease-in-out infinite alternate;
    }

    .atmo-orb.one {
      width: 600px; height: 600px;
      background: rgba(var(--accent-rgb), 0.35);
      top: -25%; left: -15%;
      opacity: 0.3;
    }

    .atmo-orb.two {
      width: 400px; height: 400px;
      background: rgba(100, 50, 255, 0.25);
      bottom: -15%; right: -10%;
      opacity: 0.25;
      animation-delay: -5s;
    }

    .atmo-orb.three {
      width: 250px; height: 250px;
      background: rgba(255, 120, 50, 0.2);
      top: 45%; right: 15%;
      opacity: 0.18;
      animation-delay: -9s;
    }

    .atmo-orb.four {
      width: 180px; height: 180px;
      background: rgba(var(--accent-rgb), 0.2);
      bottom: 30%; left: 10%;
      opacity: 0.12;
      animation-delay: -3s;
      animation-duration: 18s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { transform: translate(40px, -30px) scale(1.15) rotate(5deg); }
    }

    /* Grid pattern */
    .grid-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    /* Floating particles */
    .particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(var(--accent-rgb), 0.4);
      animation: particleFloat linear infinite;
    }

    .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 2px; height: 2px; }
    .particle:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: -3s; }
    .particle:nth-child(3) { left: 45%; animation-duration: 10s; animation-delay: -6s; width: 4px; height: 4px; }
    .particle:nth-child(4) { left: 65%; animation-duration: 18s; animation-delay: -2s; width: 2px; height: 2px; }
    .particle:nth-child(5) { left: 80%; animation-duration: 13s; animation-delay: -8s; }
    .particle:nth-child(6) { left: 90%; animation-duration: 16s; animation-delay: -5s; width: 2px; height: 2px; }

    @keyframes particleFloat {
      0% { bottom: -10px; opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { bottom: 110vh; opacity: 0; }
    }

    /* ============ LAYOUT ============ */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      width: 100%;
      max-width: var(--card-max-w);
      text-align: center;
    }

    /* ============ BRAND HEADER ============ */
    .brand {
      margin-bottom: 2rem;
      animation: revealUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand-icon {
      width: 80px; height: 80px;
      margin: 0 auto 1rem;
      position: relative;
    }

    .brand-icon .ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0.4;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .brand-icon .ring.outer {
      inset: -8px;
      border-color: rgba(var(--accent-rgb), 0.15);
      animation-delay: 0.5s;
    }

    .brand-icon .ring.glow {
      inset: -16px;
      border: none;
      background: rgba(var(--accent-rgb), 0.06);
      animation: ringPulse 4s ease-in-out infinite;
      animation-delay: 1s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 0.12; }
    }

    .brand-icon .face {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--accent), var(--accent-dark));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--display);
      font-weight: 800;
      font-size: 2rem;
      color: #fff;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 40px rgba(var(--accent-rgb), 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    /* Avatar image mode */
    .brand-icon .face img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .brand-name {
      font-family: var(--display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 0.2rem;
    }

    .brand-handle {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* ============ ANIMATIONS ============ */
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes revealScale {
      from { opacity: 0; transform: scale(0.92) translateY(16px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @keyframes shimmer {
      to { left: 120%; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 6px 30px rgba(var(--accent-rgb), 0.35); }
      50% { box-shadow: 0 8px 50px rgba(var(--accent-rgb), 0.55); }
    }

    /* ============ GENERATOR VIEW ============ */
    .gen-title {
      font-family: var(--display);
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }

    .gen-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
    }

    .gen-sub {
      font-size: 0.85rem;
      color: var(--dim);
      line-height: 1.6;
      margin-bottom: 2rem;
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    }

    /* Link type tabs */
    .link-type-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.2rem;
      animation: revealUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.18s both;
    }

    .link-type-tab {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--dim);
      font-family: var(--body);
      font-weight: 600;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .link-type-tab:hover { color: var(--white); }

    .link-type-tab.active {
      background: rgba(var(--accent-rgb), 0.12);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(var(--accent-rgb), 0.1);
    }

    .link-type-tab svg {
      width: 16px; height: 16px;
      flex-shrink: 0;
    }

    .field {
      margin-bottom: 0.9rem;
      text-align: left;
      animation: revealUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }

    .field:nth-child(2) { animation-delay: 0.25s; }

    .field-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .field-label .req { color: var(--accent); font-size: 0.8rem; }

    .field-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .field-input::placeholder { color: #333; }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.15);
      background: rgba(var(--accent-rgb), 0.03);
    }

    .field-input.error {
      border-color: #ff3b30;
      box-shadow: 0 0 0 3px rgba(255,59,48,0.15);
      animation: shake 0.4s ease;
    }

    .field-error {
      display: none;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: #ff6b6b;
      margin-top: 6px;
      line-height: 1.4;
      text-align: left;
    }

    .field-error.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .btn-main {
      width: 100%;
      padding: 16px;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-family: var(--display);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 6px 30px rgba(var(--accent-rgb), 0.35);
      animation: revealUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.3s both, breathe 3s ease-in-out infinite 1s;
    }

    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(var(--accent-rgb), 0.5); }
    .btn-main:active { transform: scale(0.97); }
    .btn-main:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; animation: revealUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.3s both; }

    .btn-main::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: none;
    }

    .btn-main:not(:disabled):hover::after {
      animation: shimmer 0.6s ease;
    }

    /* ============ RESULT ============ */
    .result {
      display: none;
      margin-top: 1.5rem;
      animation: revealScale 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--green);
      background: var(--green-soft);
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 0.75rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .result-badge .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }

    .result-url-box {
      background: var(--surface-solid);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-align: left;
      backdrop-filter: blur(10px);
    }

    .result-url {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--white);
      line-height: 1.5;
      word-break: break-all;
      user-select: all;
      margin-bottom: 12px;
      display: block;
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .btn-action {
      flex: 1;
      padding: 11px 8px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--white);
      font-family: var(--body);
      font-weight: 600;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-action:hover { background: var(--surface); border-color: rgba(255,255,255,0.15); }
    .btn-action:active { transform: scale(0.96); }

    .btn-action.copied {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }

    .btn-action svg { width: 16px; height: 16px; }

    .test-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 0.85rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      transition: gap 0.2s;
    }

    .test-link:hover { gap: 8px; }

    /* ============ FOOTER ============ */
    .footer {
      margin-top: 2.5rem;
      animation: revealUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.4s both;
    }

    .footer-divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      border-radius: 2px;
      margin: 0 auto 1rem;
    }

    .footer-link {
      font-size: 0.75rem;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-link:hover { color: var(--white); }

    .powered-by {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: rgba(255,255,255,0.15);
      margin-top: 0.6rem;
      letter-spacing: 0.5px;
    }

    /* ============ PLAYER VIEW ============ */
    .player-title {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.3rem;
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    }

    .player-id {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--dim);
      margin-bottom: 1.75rem;
      opacity: 0.7;
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }

    .player-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.1);
      border: 1px solid rgba(var(--accent-rgb), 0.2);
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 1.5rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.18s both;
    }

    .player-type-badge svg { width: 14px; height: 14px; }

    .btn-open-app {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-family: var(--display);
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 16px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 8px 40px rgba(var(--accent-rgb), 0.4);
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.3s both, breathe 3s ease-in-out infinite 1.5s;
    }

    .btn-open-app:hover { transform: translateY(-3px); box-shadow: 0 12px 50px rgba(var(--accent-rgb), 0.55); }
    .btn-open-app:active { transform: scale(0.97); }
    .btn-open-app svg { width: 24px; height: 24px; fill: #fff; }

    .player-fallback {
      display: block;
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.35s both;
    }

    .player-fallback:hover { color: var(--white); }

    .player-status {
      margin-top: 2rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--dim);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      animation: revealUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.4s both;
    }

    .player-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    /* Hide views by default */
    .view { display: none; }
    .view.active { display: block; }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 380px) {
      .gen-title { font-size: 1.5rem; }
      .link-type-tab { font-size: 0.72rem; padding: 8px 6px; }
    }
  </style>
</head>
<body>

  <!-- Atmosphere -->
  <div class="atmosphere">
    <div class="atmo-orb one"></div>
    <div class="atmo-orb two"></div>
    <div class="atmo-orb three"></div>
    <div class="atmo-orb four"></div>
  </div>
  <div class="grid-overlay"></div>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="page">
    <div class="card">

      <!-- Shared brand header (populated by config) -->
      <div class="brand">
        <div class="brand-icon">
          <div class="ring glow"></div>
          <div class="ring outer"></div>
          <div class="ring"></div>
          <div class="face" id="brandFace"></div>
        </div>
        <div class="brand-name" id="brandName"></div>
        <div class="brand-handle" id="brandHandle"></div>
      </div>

      <!-- ===== GENERATOR VIEW ===== -->
      <div class="view" id="generatorView">
        <h1 class="gen-title">Open in <span>App</span></h1>
        <p class="gen-sub">Paste any YouTube video or channel link — get a shareable link that opens directly in the YouTube app.</p>

        <!-- Link type tabs -->
        <div class="link-type-tabs">
          <button class="link-type-tab active" data-type="video">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Video
          </button>
          <button class="link-type-tab" data-type="channel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Channel
          </button>
        </div>

        <div class="field" id="inputField">
          <label class="field-label"><span class="req">*</span> <span id="inputLabel">YouTube URL or Video ID</span></label>
          <input class="field-input" type="text" id="mainInput" placeholder="youtube.com/watch?v=... or video ID" autocomplete="off" spellcheck="false" />
          <div class="field-error" id="fieldError"></div>
        </div>

        <div class="field" id="titleField">
          <label class="field-label">Title (optional)</label>
          <input class="field-input" type="text" id="titleInput" placeholder="My latest video" autocomplete="off" />
        </div>

        <button class="btn-main" id="generateBtn" disabled>Generate Link</button>

        <div class="result" id="resultArea">
          <div class="result-badge"><span class="dot"></span> Link ready</div>
          <div class="result-url-box">
            <span class="result-url" id="generatedUrl"></span>
            <div class="result-actions">
              <button class="btn-action" id="copyBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy
              </button>
              <button class="btn-action" id="shareBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                Share
              </button>
            </div>
          </div>
          <a class="test-link" id="testLink" href="#" target="_blank">Test this link <span>&rarr;</span></a>
        </div>

        <div class="footer">
          <div class="footer-divider"></div>
          <a class="footer-link" id="footerLink" href="#" target="_blank"></a>
          <div class="powered-by">Open-in-App Link Generator</div>
        </div>
      </div>

      <!-- ===== PLAYER VIEW (video) ===== -->
      <div class="view" id="playerView">
        <h1 class="player-title" id="videoTitle">Watch this video</h1>
        <div class="player-id" id="videoIdDisplay"></div>

        <div class="player-type-badge" id="playerTypeBadge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span id="playerTypeLabel">VIDEO</span>
        </div>

        <a class="btn-open-app" id="openBtn" href="#">
          <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.546 12 3.546 12 3.546s-7.505 0-9.377.504A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.504 9.376.504 9.376.504s7.505 0 9.377-.504a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><path fill="var(--bg)" d="M9.545 15.568V8.432L15.818 12z"/></svg>
          <span id="openBtnText">Open in YouTube</span>
        </a>

        <a class="player-fallback" id="fallbackLink" href="#">or open in browser &rarr;</a>

        <div class="player-status">
          <span class="dot"></span>
          <span id="platformInfo">detecting&hellip;</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    (() => {
      /* =====================================================
         SITE CONFIG — Edit this object to customise everything
         ===================================================== */
      const SITE_CONFIG = {
        // Brand identity
        brandName: 'Insight by Prem',
        brandHandle: '@insightbyprem',
        brandInitial: 'P',           // Single letter shown in avatar circle
        brandAvatar: '',             // URL to avatar image (leave empty to use brandInitial)
        youtubeChannel: 'https://youtube.com/@insightbyprem',

        // Page metadata
        pageTitle: 'Insight by Prem — Open in App',
        ogSiteName: 'Insight by Prem',

        // GitHub Pages base URL (used when origin is 'null' in iframe/preview)
        fallbackBaseUrl: 'https://prem-kumar-sharma.github.io/Open-in-app/',

        // Accent color override (CSS color) — or leave empty to use the CSS :root default
        accentColor: '',
      };

      /* ===== APPLY CONFIG ===== */
      document.title = SITE_CONFIG.pageTitle;

      const brandFace = document.getElementById('brandFace');
      if (SITE_CONFIG.brandAvatar) {
        brandFace.innerHTML = '<img src="' + SITE_CONFIG.brandAvatar + '" alt="' + SITE_CONFIG.brandName + '" />';
      } else {
        brandFace.textContent = SITE_CONFIG.brandInitial;
      }

      document.getElementById('brandName').textContent = SITE_CONFIG.brandName;
      document.getElementById('brandHandle').textContent = SITE_CONFIG.brandHandle;

      const footerLink = document.getElementById('footerLink');
      footerLink.href = SITE_CONFIG.youtubeChannel;
      footerLink.textContent = 'Visit ' + SITE_CONFIG.brandHandle + ' on YouTube \u2192';

      if (SITE_CONFIG.accentColor) {
        document.documentElement.style.setProperty('--accent', SITE_CONFIG.accentColor);
      }

      // Add OG meta
      let ogMeta = document.querySelector('meta[property="og:site_name"]');
      if (!ogMeta) { ogMeta = document.createElement('meta'); ogMeta.setAttribute('property', 'og:site_name'); document.head.appendChild(ogMeta); }
      ogMeta.content = SITE_CONFIG.ogSiteName;

      /* ===== URL PARAMS ===== */
      const params = new URLSearchParams(window.location.search);
      const videoId  = params.get('v')  || params.get('id') || '';
      const channelId = params.get('c') || params.get('channel') || '';
      const customTitle = params.get('title') || '';

      if (videoId) {
        initPlayer('video', videoId, customTitle);
      } else if (channelId) {
        initPlayer('channel', channelId, customTitle);
      } else {
        initGenerator();
      }

      /* ===== EXTRACT VIDEO ID FROM ANY YT FORMAT ===== */
      function extractVideoId(raw) {
        raw = (raw || '').trim();
        if (!raw) return null;

        if (/^[A-Za-z0-9_-]{11}$/.test(raw)) return raw;

        let url;
        try {
          if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
          url = new URL(raw);
        } catch { return null; }

        const vParam = url.searchParams.get('v');
        if (vParam && /^[A-Za-z0-9_-]{11}$/.test(vParam)) return vParam;

        if (url.hostname === 'youtu.be') {
          const id = url.pathname.slice(1).split(/[/?]/)[0];
          if (/^[A-Za-z0-9_-]{11}$/.test(id)) return id;
        }

        const pathMatch = url.pathname.match(/\/(shorts|embed|live|v)\/([A-Za-z0-9_-]{11})/);
        if (pathMatch) return pathMatch[2];

        return null;
      }

      /* ===== EXTRACT CHANNEL IDENTIFIER ===== */
      function extractChannelId(raw) {
        raw = (raw || '').trim();
        if (!raw) return null;

        // Bare handle like @username
        if (/^@[\w.-]{1,50}$/.test(raw)) return raw;

        // Channel ID like UC...
        if (/^UC[A-Za-z0-9_-]{22}$/.test(raw)) return raw;

        let url;
        try {
          if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
          url = new URL(raw);
        } catch { return null; }

        const host = url.hostname.replace(/^www\./, '');
        if (!['youtube.com', 'm.youtube.com'].includes(host)) return null;

        // /@handle
        const handleMatch = url.pathname.match(/^\/@([\w.-]{1,50})/);
        if (handleMatch) return '@' + handleMatch[1];

        // /channel/UCxxx
        const channelMatch = url.pathname.match(/^\/channel\/(UC[A-Za-z0-9_-]{22})/);
        if (channelMatch) return channelMatch[1];

        // /c/customname or /user/username
        const customMatch = url.pathname.match(/^\/(c|user)\/([\w.-]+)/);
        if (customMatch) return '@' + customMatch[2];

        return null;
      }

      function isChannelUrl(raw) {
        return /\/@|\/channel\/|\/c\/|\/user\//i.test(raw);
      }

      /* ===== BASE URL ===== */
      function getBaseUrl() {
        const origin = window.location.origin;
        if (!origin || origin === 'null') return SITE_CONFIG.fallbackBaseUrl;
        return origin + window.location.pathname;
      }

      /* ===== GENERATOR ===== */
      function initGenerator() {
        document.getElementById('generatorView').classList.add('active');

        const mainInput    = document.getElementById('mainInput');
        const titleInput   = document.getElementById('titleInput');
        const generateBtn  = document.getElementById('generateBtn');
        const resultArea   = document.getElementById('resultArea');
        const generatedUrl = document.getElementById('generatedUrl');
        const copyBtn      = document.getElementById('copyBtn');
        const shareBtn     = document.getElementById('shareBtn');
        const testLink     = document.getElementById('testLink');
        const fieldError   = document.getElementById('fieldError');
        const inputLabel   = document.getElementById('inputLabel');
        const titleField   = document.getElementById('titleField');

        let linkType = 'video';

        // Tab switching
        document.querySelectorAll('.link-type-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelector('.link-type-tab.active').classList.remove('active');
            tab.classList.add('active');
            linkType = tab.dataset.type;

            if (linkType === 'video') {
              inputLabel.textContent = 'YouTube URL or Video ID';
              mainInput.placeholder = 'youtube.com/watch?v=... or video ID';
              titleField.style.display = '';
            } else {
              inputLabel.textContent = 'YouTube Channel URL or @handle';
              mainInput.placeholder = 'youtube.com/@channel or @handle';
              titleField.style.display = '';
            }

            mainInput.value = '';
            generateBtn.disabled = true;
            resultArea.style.display = 'none';
            hideError();
            mainInput.focus();
          });
        });

        function hideError() {
          mainInput.classList.remove('error');
          fieldError.classList.remove('visible');
        }

        mainInput.addEventListener('input', () => {
          generateBtn.disabled = !mainInput.value.trim();
          resultArea.style.display = 'none';
          hideError();
        });

        function doGenerate() {
          const rawVal = mainInput.value.trim();

          if (linkType === 'video') {
            // Check if user pasted a channel URL in video mode
            if (isChannelUrl(rawVal)) {
              mainInput.classList.add('error');
              fieldError.textContent = 'This looks like a channel link. Switch to the "Channel" tab, or paste a video link instead.';
              fieldError.classList.add('visible');
              return;
            }

            const vid = extractVideoId(rawVal);
            if (!vid) {
              mainInput.classList.add('error');
              fieldError.textContent = 'Could not find a video ID. Paste a YouTube video URL or an 11-character video ID.';
              fieldError.classList.add('visible');
              return;
            }

            hideError();
            const title = titleInput.value.trim();
            let link = getBaseUrl() + '?v=' + vid;
            if (title) link += '&title=' + encodeURIComponent(title);

            showResult(link);

          } else {
            // Channel mode
            const cid = extractChannelId(rawVal);
            if (!cid) {
              mainInput.classList.add('error');
              fieldError.textContent = 'Could not parse channel. Paste a YouTube channel URL or @handle.';
              fieldError.classList.add('visible');
              return;
            }

            hideError();
            const title = titleInput.value.trim();
            let link = getBaseUrl() + '?c=' + encodeURIComponent(cid);
            if (title) link += '&title=' + encodeURIComponent(title);

            showResult(link);
          }
        }

        function showResult(link) {
          generatedUrl.textContent = link;
          testLink.href = link;
          resultArea.style.display = 'block';

          copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
          copyBtn.classList.remove('copied');

          setTimeout(() => {
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }, 100);
        }

        generateBtn.addEventListener('click', doGenerate);
        mainInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !generateBtn.disabled) doGenerate();
        });

        copyBtn.addEventListener('click', () => {
          const link = generatedUrl.textContent;
          navigator.clipboard.writeText(link).then(() => {
            copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => {
              copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
              copyBtn.classList.remove('copied');
            }, 2500);
          });
        });

        shareBtn.addEventListener('click', () => {
          const link = generatedUrl.textContent;
          if (navigator.share) {
            navigator.share({ title: SITE_CONFIG.brandName, url: link }).catch(() => {});
          } else {
            navigator.clipboard.writeText(link).then(() => {
              shareBtn.textContent = 'Link copied!';
              setTimeout(() => {
                shareBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share';
              }, 2000);
            });
          }
        });
      }

      /* ===== PLAYER ===== */
      function initPlayer(type, id, title) {
        document.getElementById('playerView').classList.add('active');

        const typeBadge = document.getElementById('playerTypeBadge');
        const typeLabel = document.getElementById('playerTypeLabel');
        const openBtnText = document.getElementById('openBtnText');

        let targetUrl, deepLink;

        if (type === 'channel') {
          document.getElementById('videoTitle').textContent = title || 'Visit this channel';
          document.getElementById('videoIdDisplay').textContent = id;

          // Badge
          typeLabel.textContent = 'CHANNEL';
          typeBadge.querySelector('svg').innerHTML = '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>';

          openBtnText.textContent = 'Open Channel';

          // Build channel URL
          if (id.startsWith('UC')) {
            targetUrl = 'https://www.youtube.com/channel/' + id;
          } else if (id.startsWith('@')) {
            targetUrl = 'https://www.youtube.com/' + id;
          } else {
            targetUrl = 'https://www.youtube.com/@' + id;
          }

        } else {
          document.getElementById('videoTitle').textContent = title || 'Watch this video';
          document.getElementById('videoIdDisplay').textContent = id;

          typeLabel.textContent = 'VIDEO';
          openBtnText.textContent = 'Open in YouTube';

          targetUrl = 'https://www.youtube.com/watch?v=' + id;
        }

        document.getElementById('fallbackLink').href = targetUrl;

        const ua = navigator.userAgent || '';
        const isAndroid = /android/i.test(ua);
        const isIOS = /iphone|ipad|ipod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isMobile = isAndroid || isIOS;

        const pi = document.getElementById('platformInfo');
        if (isAndroid) pi.textContent = 'Android detected';
        else if (isIOS) pi.textContent = 'iOS detected';
        else pi.textContent = 'Desktop \u2014 click to open';

        deepLink = targetUrl;

        if (type === 'video') {
          if (isAndroid) {
            deepLink = 'intent://www.youtube.com/watch?v=' + id + '#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url=' + encodeURIComponent(targetUrl) + ';end';
          } else if (isIOS) {
            deepLink = 'youtube://www.youtube.com/watch?v=' + id;
          }
        } else {
          // Channel deep links
          const channelPath = id.startsWith('UC')
            ? '/channel/' + id
            : (id.startsWith('@') ? '/' + id : '/@' + id);

          if (isAndroid) {
            deepLink = 'intent://www.youtube.com' + channelPath + '#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url=' + encodeURIComponent(targetUrl) + ';end';
          } else if (isIOS) {
            deepLink = 'youtube://www.youtube.com' + channelPath;
          }
        }

        const openBtn = document.getElementById('openBtn');
        openBtn.href = deepLink;

        if (isIOS) {
          openBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = deepLink;
            setTimeout(() => { window.location.href = targetUrl; }, 1500);
          });
        }

        if (isMobile) {
          setTimeout(() => { window.location.href = deepLink; }, 800);
        }
      }

    })();
  </script>
</body>
